<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Login - FastSewa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/vendor.css">
</head>
<body class="auth-page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo-section">
        <h1>FastSewa</h1>
        <p class="tagline">Vendor Login Portal</p>
      </div>

      <form id="vendorLoginForm" class="auth-form">
        <h2>Welcome Back, Partner</h2>

        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required>
        </div>

        <div class="form-options">
          <div class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Remember me</label>
          </div>
        </div>

        <button type="submit" class="btn-primary">Login to Dashboard</button>

        <div class="form-footer">
          <p>New vendor? <a href="vendor-register.html">Register now</a></p>
        </div>

        <div id="loginStatus" class="status-message"></div>
      </form>
    </div>
  </div>

  <script src="js/vendor-auth.js"></script>
</body>
</html>
