<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastSewa - Reset Password</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --primary: #ff5722;
            --primary-hover: #e64a19;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- ANIMATED BACKGROUND (Blobs) --- */
        .blob {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: -1;
            animation: float 10s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #ff5722; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: #2196f3; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        /* --- GLASS CARD --- */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            z-index: 10;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease forwards;
            opacity: 0; transform: translateY(30px);
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER & LOGO --- */
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header i { font-size: 48px; color: var(--primary); margin-bottom: 15px; }
        .auth-header h2 { font-size: 28px; font-weight: 700; margin-bottom: 5px; }
        .auth-header p { color: var(--text-muted); font-size: 14px; }

        /* --- FORM ELEMENTS --- */
        .form-group { margin-bottom: 20px; position: relative; }
        
        .form-group label {
            display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500;
        }

        .input-group { position: relative; }
        .input-group i {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 16px; transition: 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(255, 87, 34, 0.1);
        }

        .form-control:focus + i { color: var(--primary); }

        .form-control::placeholder { color: var(--text-muted); }

        /* Password Strength Indicator */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak { background: #f44336; width: 33%; }
        .strength-medium { background: #ff9800; width: 66%; }
        .strength-strong { background: #4caf50; width: 100%; }

        /* --- BUTTON --- */
        .btn-primary {
            width: 100%; padding: 14px; margin-top: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border: none; border-radius: 12px; color: white;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 87, 34, 0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .spinner { display: inline-block; }
        .spinner i { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- EXTRAS --- */
        .extras {
            display: flex; justify-content: center; margin-top: 20px;
            font-size: 14px;
        }

        .extras a {
            color: var(--text-muted); text-decoration: none; transition: 0.3s;
        }

        .extras a:hover { color: var(--primary); }

        /* --- RESPONSIVE --- */
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .auth-header h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="auth-header">
                <i class="fas fa-lock"></i>
                <h2>Reset Password</h2>
                <p>Enter your new password</p>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="Enter new password" required minlength="6">
                    </div>
                    <div class="password-strength" id="passwordStrength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <span id="btnText">Reset Password</span>
                    <span id="btnSpinner" class="spinner" style="display: none;">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                </button>

                <div class="extras">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="js/reset-password.js"></script>
</body>
</html>
